{% extends "base.html" %}
{% block title %}Iniciar sesión · IngeScan{% endblock %}
{% block navbar %}{% endblock %}

{% block body %}
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-mark">I</span>
      <span class="auth-brand-name">IngeScan</span>
    </div>
    <h1>Iniciar sesión</h1>
    <p class="lead-sm">Accede para identificar componentes electrónicos.</p>

    <form method="POST" novalidate>
      <div class="mb-3">
        <label for="codigo" class="form-label">Código de estudiante</label>
        <input type="text" id="codigo" name="codigo" class="form-control" placeholder="Ej. U20191234" required autocomplete="username">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" id="password" name="password" class="form-control" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-brand w-100">Ingresar</button>
    </form>

    <p class="auth-foot">
      ¿No tienes cuenta? <a href="{{ url_for('register') }}">Crear cuenta</a>
    </p>
  </div>
</div>
{% endblock %}
