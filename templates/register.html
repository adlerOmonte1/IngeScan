{% extends "base.html" %}
{% block title %}Crear cuenta · IngeScan{% endblock %}
{% block navbar %}{% endblock %}

{% block body %}
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-mark">I</span>
      <span class="auth-brand-name">IngeScan</span>
    </div>
    <h1>Crear cuenta</h1>
    <p class="lead-sm">Regístrate para comenzar a usar el detector.</p>

    <form method="POST" novalidate>
      <div class="mb-3">
        <label for="nombre" class="form-label">Nombre completo</label>
        <input type="text" id="nombre" name="nombre" class="form-control" required autocomplete="name">
      </div>
      <div class="mb-3">
        <label for="codigo" class="form-label">Código de estudiante</label>
        <input type="text" id="codigo" name="codigo" class="form-control" placeholder="Ej. U20191234" required autocomplete="username">
      </div>
      <div class="mb-3">
        <label for="carrera" class="form-label">Carrera</label>
        <input type="text" id="carrera" name="carrera" class="form-control" placeholder="Ingeniería Electrónica" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" id="password" name="password" class="form-control" required minlength="6" autocomplete="new-password">
        <div class="form-text">Mínimo 6 caracteres.</div>
      </div>
      <button type="submit" class="btn btn-brand w-100">Crear cuenta</button>
    </form>

    <p class="auth-foot">
      ¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Iniciar sesión</a>
    </p>
  </div>
</div>
{% endblock %}
